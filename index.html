
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backstage — Setlist Voting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Kalam:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --stage-black:#141219;
    --stage-black-2:#1c1922;
    --stage-black-3:#242030;
    --amber:#e8a33d;
    --amber-dim:#a9762b;
    --paper:#efe6d0;
    --paper-dim:#d9cfb4;
    --tape:#9a9488;
    --green:#63a15f;
    --green-dim:#3c5c3a;
    --amber-warn:#d9a441;
    --red:#c15a48;
    --red-dim:#5c3a34;
    --text-light:#f2ede0;
    --text-dim:#a39c8e;
    --text-faint:#6f6a60;
    --radius:3px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(232,163,61,0.10), transparent 55%),
      var(--stage-black);
    color:var(--text-light);
    font-family:'Space Grotesk',sans-serif;
    min-height:100vh;
    padding:0 0 60px;
  }
  .marquee{
    text-align:center;
    padding:38px 20px 24px;
    border-bottom:1px solid var(--stage-black-3);
    position:relative;
  }
  .marquee::before{
    content:'';
    position:absolute; left:0; right:0; top:0; height:3px;
    background:linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity:0.6;
  }
  .eyebrow{
    font-family:'Space Grotesk',sans-serif;
    font-size:11px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--amber);
    margin-bottom:10px;
  }
  h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-size:clamp(28px,5vw,44px);
    margin:0;
    text-shadow:0 0 26px rgba(232,163,61,0.25);
  }
  .sub{
    color:var(--text-dim);
    font-size:14px;
    margin-top:8px;
  }

  /* gauge */
  .gauge-wrap{
    max-width:640px;
    margin:26px auto 0;
    padding:0 20px;
  }
  .gauge-labels{
    display:flex;
    justify-content:space-between;
    font-family:'Oswald',sans-serif;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .gauge-labels b{ color:var(--text-light); font-size:15px; letter-spacing:0.02em; }
  .gauge{
    height:14px;
    background:var(--stage-black-2);
    border:1px solid var(--stage-black-3);
    border-radius:2px;
    overflow:hidden;
    position:relative;
    display:flex;
  }
  .gauge-fill{
    height:100%;
    transition:width .35s ease;
    background:repeating-linear-gradient(90deg, var(--green) 0 8px, var(--green-dim) 8px 9px);
  }
  .gauge-fill.over{
    background:repeating-linear-gradient(90deg, var(--red) 0 8px, var(--red-dim) 8px 9px);
  }
  .gauge-target-line{
    position:absolute; top:0; bottom:0; width:2px; background:var(--amber);
    box-shadow:0 0 8px var(--amber);
  }
  .gauge-ticks{ display:flex; justify-content:space-between; margin-top:4px; }
  .gauge-ticks span{ font-size:10px; color:var(--text-faint); }

  /* identity bar */
  .idbar{
    max-width:900px;
    margin:22px auto 0;
    padding:0 20px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .chip{
    background:var(--stage-black-2);
    border:1px solid var(--stage-black-3);
    padding:8px 14px;
    border-radius:20px;
    font-size:13px;
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .chip b{ color:var(--amber); font-weight:600; }
  .chip button{
    background:none; border:none; color:var(--text-faint);
    text-decoration:underline; cursor:pointer; font-size:12px; font-family:inherit;
    padding:0;
  }
  .idform{ display:flex; gap:8px; align-items:center; }
  .idform input{
    background:var(--stage-black-2);
    border:1px solid var(--stage-black-3);
    color:var(--text-light);
    padding:8px 12px;
    border-radius:20px;
    font-family:inherit;
    font-size:13px;
    outline:none;
  }
  .idform input:focus{ border-color:var(--amber-dim); }
  .btn{
    background:var(--amber);
    color:var(--stage-black);
    border:none;
    padding:8px 16px;
    border-radius:20px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .btn:hover{ background:#f0b459; }
  .btn.ghost{
    background:transparent;
    color:var(--amber);
    border:1px solid var(--amber-dim);
  }
  .btn.ghost:hover{ background:rgba(232,163,61,0.08); }
  .btn.small{ padding:6px 12px; font-size:12px; }

  main{ max-width:1100px; margin:0 auto; padding:34px 20px 0; }

  .section{ margin-bottom:44px; }
  .section-head{
    display:flex;
    align-items:baseline;
    gap:14px;
    margin-bottom:18px;
    border-bottom:1px dashed var(--stage-black-3);
    padding-bottom:10px;
  }
  .section-head h2{
    font-family:'Kalam',cursive;
    font-weight:700;
    font-size:26px;
    color:var(--paper);
    margin:0;
    transform:rotate(-1deg);
  }
  .section-meta{ font-size:12px; color:var(--text-faint); font-family:'Space Grotesk'; }

  .sheet{
    background:linear-gradient(180deg, var(--paper), var(--paper-dim));
    color:#1c1710;
    border-radius:3px;
    position:relative;
    box-shadow:0 8px 20px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(0,0,0,0.05);
  }
  .sheet::before{
    content:'';
    position:absolute;
    top:-9px; left:50%; transform:translateX(-50%) rotate(-1.5deg);
    width:70px; height:20px;
    background:rgba(154,148,136,0.55);
    border:1px solid rgba(0,0,0,0.08);
  }

  .row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:11px 18px;
    border-bottom:1px dashed rgba(0,0,0,0.14);
  }
  .row:last-of-type{ border-bottom:none; }

  .row-num{
    font-family:'Oswald',sans-serif;
    font-size:12px;
    color:#8a7f5c;
    letter-spacing:0.04em;
    width:22px;
    flex-shrink:0;
  }

  .row-main{ flex:1 1 auto; min-width:0; }
  .row-title-line{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; row-gap:3px; }
  .row-title{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:15px;
    white-space:nowrap;
  }
  .row-artist{ font-size:11.5px; color:#6b6250; white-space:nowrap; }
  .cue{
    font-family:'Kalam',cursive;
    font-size:12px;
    color:#7a5a2c;
    background:rgba(232,163,61,0.16);
    display:inline-block;
    padding:1px 7px;
    border-radius:2px;
  }
  .know-col, .learn-col, .playlist-col{
    font-family:'Space Grotesk',sans-serif;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:0.02em;
    padding:4px 2px;
    border-radius:9px;
    white-space:nowrap;
    width:52px;
    flex-shrink:0;
    text-align:center;
    border:1px solid rgba(0,0,0,0.14);
    background:transparent;
    color:#8a7f5c;
    cursor:pointer;
    transition:all .15s ease;
  }
  .playlist-col{ width:68px; }
  .know-col:hover, .learn-col:hover, .playlist-col:hover{ border-color:#3a3122; }
  .know-col.is-on{ color:#3f6b3c; background:rgba(99,161,95,0.18); border-color:transparent; }
  .learn-col.is-on{ color:#a1442f; background:rgba(193,90,72,0.18); border-color:transparent; }
  .playlist-col.is-on{ color:#8a611c; background:rgba(232,163,61,0.22); border-color:transparent; font-weight:700; }

  .edit-btn{
    flex-shrink:0;
    width:28px; height:28px;
    display:flex; align-items:center; justify-content:center;
    background:transparent;
    color:#8a7f5c;
    border:1px solid #b8ab84;
    border-radius:50%;
    font-size:12px;
    cursor:pointer;
  }
  .edit-btn:hover{ color:#3a3122; border-color:#3a3122; }

  .row-header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:9px 18px;
    border-bottom:1px solid rgba(0,0,0,0.14);
    font-family:'Oswald',sans-serif;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#8a7f5c;
  }
  .row-header .rh-num{ width:22px; flex-shrink:0; }
  .row-header .rh-main{ flex:1 1 auto; }
  .row-header .rh-know{ width:52px; flex-shrink:0; text-align:center; }
  .row-header .rh-learn{ width:52px; flex-shrink:0; text-align:center; }
  .row-header .rh-playlist{ width:68px; flex-shrink:0; text-align:center; }
  .row-header .rh-duration{ width:40px; flex-shrink:0; text-align:right; }
  .row-header .rh-dots{ width:134px; flex-shrink:0; }
  .row-header .rh-avg{ width:78px; flex-shrink:0; text-align:right; }
  .row-header .rh-status{ min-width:52px; flex-shrink:0; text-align:center; }
  .row-header .rh-spotify{ width:28px; flex-shrink:0; }
  .row-header .rh-edit{ width:28px; flex-shrink:0; }
  @media (max-width:640px){ .row-header{ display:none; } }

  .row-duration{
    font-size:11px; color:#8a7f5c; width:40px; text-align:right; flex-shrink:0;
  }

  .row-dots{ display:flex; gap:3px; flex-shrink:0; }
  .dot{
    width:22px; height:22px;
    border-radius:50%;
    border:1px solid #b8ab84;
    background:transparent;
    cursor:pointer;
    font-family:'Space Grotesk';
    font-size:11px;
    color:#6b6250;
    display:flex; align-items:center; justify-content:center;
    transition:all .15s ease;
    flex-shrink:0;
    padding:0;
  }
  .dot:hover{ border-color:#8a7f5c; }
  .dot.active{
    background:#3a3122;
    border-color:#3a3122;
    color:var(--amber);
    font-weight:700;
  }

  .row-avg{
    width:78px; flex-shrink:0; text-align:right;
    font-size:11.5px; color:#6b6250;
  }
  .row-avg b{ color:#2a2412; font-size:12.5px; }

  .status-badge{
    font-family:'Oswald',sans-serif;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:3px 8px;
    border-radius:10px;
    color:var(--text-light);
    white-space:nowrap;
    flex-shrink:0;
    min-width:52px;
    text-align:center;
  }
  .status-in{ background:var(--green); }
  .status-maybe{ background:var(--amber-warn); color:#2a1e07; }
  .status-out{ background:#8a8378; color:#f2ede0; }
  .status-none{ background:transparent; color:#8a7f5c; border:1px dashed #8a7f5c; }

  .spotify-btn{
    flex-shrink:0;
    width:28px; height:28px;
    display:flex; align-items:center; justify-content:center;
    background:#1DB954;
    color:#08210f;
    border:none;
    border-radius:50%;
    font-size:13px;
    cursor:pointer;
  }
  .spotify-btn:hover{ filter:brightness(1.08); }

  .add-row{
    padding:13px 18px;
    color:#8a7f5c;
    cursor:pointer;
    font-family:'Oswald',sans-serif;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-size:12px;
    text-align:center;
    transition:all .15s ease;
  }
  .add-row:hover{ color:#5c4f2c; background:rgba(0,0,0,0.04); }

  @media (max-width:640px){
    .row{ flex-wrap:wrap; row-gap:8px; }
    .row-main{ flex-basis:100%; order:1; }
    .row-num{ order:0; }
    .know-col{ order:2; }
    .learn-col{ order:2; }
    .playlist-col{ order:2; }
    .row-duration{ order:3; }
    .row-dots{ order:4; }
    .row-avg{ order:5; }
    .status-badge{ order:6; }
    .spotify-btn{ order:7; }
    .edit-btn{ order:8; }
  }

  /* modal */
  .overlay{
    position:fixed; inset:0; background:rgba(10,9,13,0.7);
    display:none; align-items:center; justify-content:center; z-index:50;
    padding:20px;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:var(--stage-black-2);
    border:1px solid var(--stage-black-3);
    border-radius:6px;
    padding:26px;
    width:100%; max-width:420px;
  }
  .modal h3{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin:0 0 16px;
    font-size:17px;
    color:var(--amber);
  }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:11px; color:var(--text-dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.06em; }
  .field input, .field select{
    width:100%;
    background:var(--stage-black);
    border:1px solid var(--stage-black-3);
    color:var(--text-light);
    padding:9px 11px;
    border-radius:3px;
    font-family:inherit;
    font-size:14px;
    outline:none;
  }
  .field input:focus, .field select:focus{ border-color:var(--amber-dim); }
  .checkbox-field{ margin-bottom:6px; }
  .checkbox-label{
    display:flex !important;
    align-items:center;
    gap:9px;
    cursor:pointer;
    text-transform:none !important;
    letter-spacing:0 !important;
    font-size:13.5px !important;
    color:var(--text-light) !important;
  }
  .checkbox-label input{ width:auto; accent-color:var(--amber); cursor:pointer; }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }

  footer{
    text-align:center;
    padding:30px 20px 0;
    color:var(--text-faint);
    font-size:11.5px;
  }
  footer button{
    background:none; border:none; color:var(--text-faint); text-decoration:underline;
    cursor:pointer; font-family:inherit; font-size:11.5px;
  }
  .loading-msg{ text-align:center; color:var(--text-dim); padding:60px 20px; font-size:14px; }

  .setup-banner{
    display:none;
    max-width:640px;
    margin:18px auto 0;
    padding:12px 16px;
    background:rgba(232,163,61,0.14);
    border:1px solid var(--amber-dim);
    border-radius:4px;
    color:var(--text-light);
    font-size:13px;
    line-height:1.5;
    text-align:center;
  }
  .setup-banner b{ color:var(--amber); }

  .top-cta{
    display:flex;
    justify-content:center;
    margin:22px auto 0;
  }
  .top-cta .btn{
    font-family:'Oswald',sans-serif;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-size:14px;
    padding:11px 26px;
    border-radius:24px;
    box-shadow:0 4px 14px rgba(232,163,61,0.25);
  }
  .top-cta .btn:hover{ box-shadow:0 6px 18px rgba(232,163,61,0.35); }
</style>
</head>
<body>

<div class="marquee">
  <div class="eyebrow">Backstage · Live Setlist Builder</div>
  <h1>Two-Hour Set</h1>
  <div class="sub">Rate each song 1–5. The board tallies everyone's score live.</div>

  <div class="gauge-wrap">
    <div class="gauge-labels">
      <span>Set time (songs added to playlist)</span>
      <b id="gaugeText">0:00 / 120:00</b>
    </div>
    <div class="gauge"><div class="gauge-fill" id="gaugeFill" style="width:0%"></div></div>
    <div class="gauge-ticks">
      <span>0:00</span><span>30:00</span><span>60:00</span><span>90:00</span><span>120:00</span>
    </div>
  </div>
</div>

<div class="setup-banner" id="setupBanner"></div>

<div class="top-cta">
  <button class="btn" id="topAddBtn">+ Add a Song</button>
</div>

<div class="idbar" id="idbar"></div>

<main id="main">
  <div class="loading-msg">Loading the setlist…</div>
</main>

<footer>
  Data is shared with everyone using this board. &nbsp;·&nbsp;
  <button id="resetBtn">Reset all songs &amp; votes</button>
</footer>

<div class="overlay" id="addOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add a song</h3>
    <div class="field">
      <label>Title</label>
      <input id="f-title" type="text" placeholder="Song title">
    </div>
    <div class="field">
      <label>Artist</label>
      <input id="f-artist" type="text" placeholder="Original artist">
    </div>
    <div class="field">
      <label>Duration (mm:ss)</label>
      <input id="f-duration" type="text" placeholder="4:00">
    </div>
    <div class="field">
      <label>Cue / note (optional)</label>
      <input id="f-cue" type="text" placeholder="e.g. jam in middle">
    </div>
    <div class="field checkbox-field">
      <label class="checkbox-label">
        <input id="f-known" type="checkbox">
        <span>We already know this one</span>
      </label>
    </div>
    <div class="field checkbox-field">
      <label class="checkbox-label">
        <input id="f-needslearn" type="checkbox">
        <span>Needs to be learned / rehearsed</span>
      </label>
    </div>
    <div class="field checkbox-field">
      <label class="checkbox-label">
        <input id="f-playlist" type="checkbox">
        <span>Add to this show's playlist</span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn ghost small" id="f-delete" style="display:none; margin-right:auto; color:var(--red);">Delete song</button>
      <button class="btn ghost small" id="f-cancel">Cancel</button>
      <button class="btn small" id="f-save">Add song</button>
    </div>
  </div>
</div>

<div class="overlay" id="nameOverlay">
  <div class="modal">
    <h3>Who's voting?</h3>
    <div class="field">
      <label>Your name</label>
      <input id="f-name" type="text" placeholder="e.g. Zach">
    </div>
    <div class="modal-actions">
      <button class="btn small" id="f-name-save">Let's go</button>
    </div>
  </div>
</div>

<script>

let songs = [];
let votes = {}; // { songId: { voterName: score } }
let myName = null;
let editingId = null;
let BUCKET_ID = '__NO_BUCKET__'; // auto-filled from the ?b= URL param, or created fresh on first visit

function fmtTime(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}

function kvUrl(key){
  return 'https://kvdb.io/' + BUCKET_ID + '/' + key;
}

async function kvGet(key){
  const res = await fetch(kvUrl(key));
  if(res.status === 404) return null;
  if(!res.ok) throw new Error('kvdb get failed: ' + res.status);
  return await res.text();
}

async function kvSet(key, value){
  const res = await fetch(kvUrl(key), {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: value
  });
  if(!res.ok){
    let detail = '';
    try{ detail = await res.text(); }catch(e){}
    throw new Error('kvdb set failed: ' + res.status + ' ' + detail);
  }
}

async function createBucket(){
  const res = await fetch('https://kvdb.io/', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'email=band-setlist-board@example.com'
  });
  if(!res.ok) throw new Error('Could not create storage bucket: ' + res.status);
  return (await res.text()).trim();
}

async function ensureBucket(){
  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('b');
  if(fromUrl){
    BUCKET_ID = fromUrl;
    return;
  }
  const banner = document.getElementById('setupBanner');
  try{
    const id = await createBucket();
    BUCKET_ID = id;
    const url = new URL(location.href);
    url.searchParams.set('b', id);
    history.replaceState(null, '', url);
    if(banner){
      banner.innerHTML = 'Board created! This page\'s link now has a unique ID in it — copy the address bar URL and send <b>that exact link</b> to your bandmates. Everyone who opens it will share the same votes.';
      banner.style.display = 'block';
    }
  } catch(e){
    if(banner){
      banner.innerHTML = 'Could not set up shared storage — check your connection and reload the page to try again.';
      banner.style.display = 'block';
    }
    throw e;
  }
}

async function loadData(){
  await ensureBucket();

  try{
    let sl = await kvGet('songlist');
    if(sl){
      songs = JSON.parse(sl);
      // migrate: clear old performance notes on any of the originally preloaded songs
      const defaultById = {};
      DEFAULT_SONGS.forEach(d => defaultById[d.id] = d);
      let changed = false;
      songs.forEach(s => {
        if(defaultById[s.id] && s.cue !== defaultById[s.id].cue){
          s.cue = defaultById[s.id].cue;
          changed = true;
        }
        if(typeof s.known !== 'boolean'){
          s.known = defaultById[s.id] ? defaultById[s.id].known : true;
          changed = true;
        }
        if(typeof s.needsToLearn !== 'boolean'){
          s.needsToLearn = defaultById[s.id] ? defaultById[s.id].needsToLearn : !s.known;
          changed = true;
        }
        if(typeof s.inPlaylist !== 'boolean'){
          s.inPlaylist = defaultById[s.id] ? defaultById[s.id].inPlaylist : false;
          changed = true;
        }
      });
      if(changed) await kvSet('songlist', JSON.stringify(songs));
    } else {
      songs = DEFAULT_SONGS.slice();
      await kvSet('songlist', JSON.stringify(songs));
    }
  } catch(e){
    console.error('Could not load songs', e);
    songs = DEFAULT_SONGS.slice();
  }

  try{
    let av = await kvGet('all-votes');
    votes = av ? JSON.parse(av) : {};
  } catch(e){
    console.error('Could not load votes', e);
    votes = {};
  }

  try{
    myName = localStorage.getItem('setlist-voter-name');
  } catch(e){
    myName = null;
  }
}

function showSaveError(context){
  const banner = document.getElementById('setupBanner');
  if(banner){
    banner.innerHTML = 'Could not save your last change (' + context + '). Check your connection and try again — if it keeps happening, open the browser console (right-click → Inspect → Console) and tell Claude what error appears.';
    banner.style.background = 'rgba(193,90,72,0.16)';
    banner.style.borderColor = 'var(--red)';
    banner.style.display = 'block';
  }
}

async function saveSongs(){
  try{ await kvSet('songlist', JSON.stringify(songs)); }
  catch(e){ console.error('Could not save songs', e); showSaveError('song list'); }
}
async function saveVotes(){
  try{ await kvSet('all-votes', JSON.stringify(votes)); }
  catch(e){ console.error('Could not save votes', e); showSaveError('vote'); }
}
async function saveIdentity(name){
  try{ localStorage.setItem('setlist-voter-name', name); }
  catch(e){ console.error('Could not save identity', e); }
}

function avgFor(songId){
  const v = votes[songId];
  if(!v) return null;
  const vals = Object.values(v);
  if(vals.length === 0) return null;
  return vals.reduce((a,b)=>a+b,0) / vals.length;
}
function countFor(songId){
  const v = votes[songId];
  return v ? Object.keys(v).length : 0;
}
function statusFor(avg){
  if(avg === null) return {cls:'status-none', label:'Unrated'};
  if(avg >= 3.5) return {cls:'status-in', label:'In'};
  if(avg >= 2.5) return {cls:'status-maybe', label:'Maybe'};
  return {cls:'status-out', label:'Out'};
}

function renderIdBar(){
  const el = document.getElementById('idbar');
  if(myName){
    el.innerHTML = '';
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = 'Voting as <b>'+escapeHtml(myName)+'</b>';
    const changeBtn = document.createElement('button');
    changeBtn.textContent = 'change';
    changeBtn.onclick = () => { myName = null; renderIdBar(); document.getElementById('nameOverlay').classList.add('show'); };
    chip.appendChild(changeBtn);
    el.appendChild(chip);
  } else {
    document.getElementById('nameOverlay').classList.add('show');
    el.innerHTML = '<div class="chip">Set your name to start voting</div>';
  }
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderGauge(){
  let total = 0;
  songs.forEach(s => {
    if(s.inPlaylist) total += s.duration;
  });
  const pct = Math.min(100, (total/TARGET_SECONDS)*100);
  const fill = document.getElementById('gaugeFill');
  fill.style.width = pct + '%';
  fill.classList.toggle('over', total > TARGET_SECONDS);
  document.getElementById('gaugeText').textContent = fmtTime(total) + ' / 120:00';
}

function render(){
  renderIdBar();
  renderGauge();
  const main = document.getElementById('main');
  main.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'section';

  const head = document.createElement('div');
  head.className = 'section-head';
  let total = songs.reduce((a,s)=>a+s.duration,0);
  head.innerHTML = '<h2>Song Pool</h2><span class="section-meta">'+songs.length+' songs · '+fmtTime(total)+' if all played</span>';
  wrap.appendChild(head);

  const sheet = document.createElement('div');
  sheet.className = 'sheet';

  const header = document.createElement('div');
  header.className = 'row-header';
  header.innerHTML = `
    <span class="rh-num"></span>
    <span class="rh-main">Song</span>
    <span class="rh-know">Know it</span>
    <span class="rh-learn">Learn?</span>
    <span class="rh-playlist">Playlist</span>
    <span class="rh-duration">Time</span>
    <span class="rh-dots">Your score</span>
    <span class="rh-avg">Avg</span>
    <span class="rh-status">Status</span>
    <span class="rh-spotify"></span>
    <span class="rh-edit"></span>
  `;
  sheet.appendChild(header);

  songs.forEach((s, idx) => {
    sheet.appendChild(renderRow(s, idx+1));
  });

  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  addRow.textContent = '+ Add a song';
  addRow.onclick = () => openAddModal();
  sheet.appendChild(addRow);

  wrap.appendChild(sheet);
  main.appendChild(wrap);
}

function renderRow(s, num){
  const row = document.createElement('div');
  row.className = 'row';

  const avg = avgFor(s.id);
  const cnt = countFor(s.id);
  const st = statusFor(avg);
  const myScore = (votes[s.id] && myName) ? votes[s.id][myName] : undefined;

  row.innerHTML = `
    <span class="row-num">${String(num).padStart(2,'0')}</span>
    <div class="row-main">
      <div class="row-title-line">
        <span class="row-title">${escapeHtml(s.title)}</span>
        <span class="row-artist">${escapeHtml(s.artist)}</span>
        ${s.cue ? `<span class="cue">${escapeHtml(s.cue)}</span>` : ''}
      </div>
    </div>
    <button class="know-col ${s.known ? 'is-on' : ''}" title="Click to toggle">${s.known ? '✓ Know' : 'Know'}</button>
    <button class="learn-col ${s.needsToLearn ? 'is-on' : ''}" title="Click to toggle">${s.needsToLearn ? '✓ Learn' : 'Learn'}</button>
    <button class="playlist-col ${s.inPlaylist ? 'is-on' : ''}" title="Click to toggle">${s.inPlaylist ? '✓ Playlist' : '+ Playlist'}</button>
    <span class="row-duration">${fmtTime(s.duration)}</span>
    <div class="row-dots" data-song="${s.id}"></div>
    <span class="row-avg">${avg===null ? '—' : '<b>'+avg.toFixed(1)+'</b> avg · '+cnt+'v'}</span>
    <span class="status-badge ${st.cls}">${st.label}</span>
  `;

  row.querySelector('.know-col').onclick = () => toggleFlag(s.id, 'known');
  row.querySelector('.learn-col').onclick = () => toggleFlag(s.id, 'needsToLearn');
  row.querySelector('.playlist-col').onclick = () => toggleFlag(s.id, 'inPlaylist');

  const dotsWrap = row.querySelector('.row-dots');
  for(let i=1;i<=5;i++){
    const dot = document.createElement('button');
    dot.className = 'dot' + (myScore === i ? ' active' : '');
    dot.textContent = i;
    dot.onclick = () => castVote(s.id, i);
    dotsWrap.appendChild(dot);
  }

  const spotifyBtn = document.createElement('button');
  spotifyBtn.className = 'spotify-btn';
  spotifyBtn.title = 'Search on Spotify';
  spotifyBtn.textContent = '♫';
  spotifyBtn.onclick = () => {
    const q = encodeURIComponent(s.title + ' ' + s.artist);
    window.open('https://open.spotify.com/search/' + q, '_blank');
  };
  row.appendChild(spotifyBtn);

  const editBtn = document.createElement('button');
  editBtn.className = 'edit-btn';
  editBtn.title = 'Edit song';
  editBtn.textContent = '✎';
  editBtn.onclick = () => openAddModal(s);
  row.appendChild(editBtn);

  return row;
}

async function toggleFlag(songId, field){
  const song = songs.find(s => s.id === songId);
  if(!song) return;
  song[field] = !song[field];
  render();
  await saveSongs();
}

async function castVote(songId, score){
  if(!myName){
    document.getElementById('nameOverlay').classList.add('show');
    return;
  }
  if(!votes[songId]) votes[songId] = {};
  // toggle off if clicking same score again
  if(votes[songId][myName] === score){
    delete votes[songId][myName];
  } else {
    votes[songId][myName] = score;
  }
  render();
  await saveVotes();
}

function parseDuration(str){
  if(!str) return 240;
  const parts = str.split(':');
  if(parts.length === 2){
    const m = parseInt(parts[0],10) || 0;
    const s = parseInt(parts[1],10) || 0;
    return m*60+s;
  }
  const n = parseInt(str,10);
  return isNaN(n) ? 240 : n*60;
}

function openAddModal(existing){
  editingId = existing ? existing.id : null;
  document.getElementById('modalTitle').textContent = existing ? 'Edit song' : 'Add a song';
  document.getElementById('f-title').value = existing ? existing.title : '';
  document.getElementById('f-artist').value = existing ? existing.artist : '';
  document.getElementById('f-duration').value = existing ? fmtTime(existing.duration) : '';
  document.getElementById('f-cue').value = existing ? (existing.cue || '') : '';
  document.getElementById('f-known').checked = existing ? !!existing.known : false;
  document.getElementById('f-needslearn').checked = existing ? !!existing.needsToLearn : false;
  document.getElementById('f-playlist').checked = existing ? !!existing.inPlaylist : false;
  document.getElementById('f-save').textContent = existing ? 'Save changes' : 'Add song';
  document.getElementById('f-delete').style.display = existing ? 'inline-block' : 'none';
  document.getElementById('addOverlay').classList.add('show');
  document.getElementById('f-title').focus();
}

document.getElementById('topAddBtn').onclick = () => openAddModal();

document.getElementById('f-cancel').onclick = () => {
  document.getElementById('addOverlay').classList.remove('show');
};

document.getElementById('f-save').onclick = async () => {
  const title = document.getElementById('f-title').value.trim();
  if(!title) { document.getElementById('f-title').focus(); return; }
  const artist = document.getElementById('f-artist').value.trim();
  const duration = parseDuration(document.getElementById('f-duration').value.trim());
  const cue = document.getElementById('f-cue').value.trim();
  const known = document.getElementById('f-known').checked;
  const needsToLearn = document.getElementById('f-needslearn').checked;
  const inPlaylist = document.getElementById('f-playlist').checked;

  if(editingId){
    const song = songs.find(s => s.id === editingId);
    if(song){
      song.title = title; song.artist = artist; song.duration = duration;
      song.cue = cue; song.known = known; song.needsToLearn = needsToLearn;
      song.inPlaylist = inPlaylist;
    }
  } else {
    const id = 'song-' + Date.now() + '-' + Math.floor(Math.random()*1000);
    songs.push({id, title, artist, section:'All', duration, cue, known, needsToLearn, inPlaylist});
  }
  document.getElementById('addOverlay').classList.remove('show');
  editingId = null;
  render();
  await saveSongs();
};

document.getElementById('f-delete').onclick = async () => {
  if(!editingId) return;
  if(!confirm('Remove this song from the list for everyone?')) return;
  songs = songs.filter(s => s.id !== editingId);
  delete votes[editingId];
  document.getElementById('addOverlay').classList.remove('show');
  editingId = null;
  render();
  await saveSongs();
  await saveVotes();
};

document.getElementById('f-name-save').onclick = async () => {
  const name = document.getElementById('f-name').value.trim();
  if(!name) { document.getElementById('f-name').focus(); return; }
  myName = name;
  document.getElementById('nameOverlay').classList.remove('show');
  await saveIdentity(name);
  render();
};
document.getElementById('f-name').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('f-name-save').click();
});

document.getElementById('resetBtn').onclick = async () => {
  if(!confirm('This clears the song list and every vote for everyone using this board. Continue?')) return;
  songs = DEFAULT_SONGS.slice();
  votes = {};
  render();
  await saveSongs();
  await saveVotes();
};

(async function init(){
  await loadData();
  render();
})();
</script>
